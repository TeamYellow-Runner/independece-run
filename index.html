<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Team Yellow - Independence Run</title>
    <style>
        /* CSS: Verriegelt das Handy-Display */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior: none; -webkit-overflow-scrolling: none;
        }
        #game-container { position: relative; background: #111; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; touch-action: none; }
        #loading { position: absolute; color: #FFD700; font-family: sans-serif; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="loading">LADE TEAM YELLOW...</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Auflösung & Skalierung
canvas.width = 1080; canvas.height = 1920;
function resize() {
    const ratio = 1080 / 1920;
    let w = window.innerWidth, h = window.innerHeight;
    if (w / h > ratio) w = h * ratio; else h = w / ratio;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const container = document.getElementById('game-container');
    container.style.width = w + 'px'; container.style.height = h + 'px';
}
window.addEventListener('resize', resize); resize();

// Variablen & Setup
let gameState = 'LOADING', score = 0, playerHP = 3, bossHP = 10;
let currentLevel = 1, playerLane = 1, bossLane = 1, selectedGender = 'm';
let gameSpeed = 16, backgroundY = 0, frameCount = 0;
const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

const images = {};
const audio = {};
let loadedAssets = 0;
const assetsToLoad = {
    bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
    runner_m: 'runner_m.png', runner_f: 'runner_f.png',
    agent: 'enemy_agent.png', boss: 'boss_ceo.png',
    gate: 'item_gate.png', proj_ty: 'proj_ty.png', proj_syn: 'proj_syn.png',
    sc_start: 'sc_start.png', sc_gameover: 'sc_gameover.png', sc_victory: 'sc_victory.png',
    ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
};

function loadAll() {
    for (let key in assetsToLoad) {
        images[key] = new Image();
        images[key].onload = () => { if(++loadedAssets >= Object.keys(assetsToLoad).length) {
            document.getElementById('loading').style.display = 'none';
            gameState = 'START';
        }};
        images[key].src = assetsToLoad[key];
    }
    audio.main = new Audio('music_main_loop.mp3'); audio.main.loop = true;
    audio.win = new Audio('music_victory.mp3'); audio.lose = new Audio('music_gameover.mp3');
}
loadAll();

let obstacles = [], projectiles = [];

// Input-Logik (Präzise Buttons)
function handleInput(e) {
    if(e.cancelable) e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cX = (e.touches ? e.touches[0].clientX : e.clientX);
    const cY = (e.touches ? e.touches[0].clientY : e.clientY);
    const x = (cX - rect.left) * (canvas.width / rect.width);
    const y = (cY - rect.top) * (canvas.height / rect.height);

    if (gameState === 'START') {
        if (y < 1600) { selectedGender = (x < 540) ? 'm' : 'f'; startGame(); }
        else { window.open(channelLink, '_blank'); }
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        if (x < 360) playerLane = 0; else if (x > 720) playerLane = 2; else playerLane = 1;
        if (gameState === 'BOSS') projectiles.push({lane: playerLane, y: 1500});
    } else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
        if (y > 1400 && y < 1620) location.reload(); // Wiederholen
        else if (y >= 1620) window.open(channelLink, '_blank'); // Kanal
        else if (gameState === 'VICTORY' && y > 1150 && y < 1400) shareGame(); // Teilen
    }
}
canvas.addEventListener('touchstart', handleInput, {passive: false});
canvas.addEventListener('mousedown', handleInput);

function startGame() {
    gameState = 'PLAYING'; score = 0; currentLevel = 1; playerHP = 3; bossHP = 10;
    obstacles = []; projectiles = [];
    audio.main.play().catch(() => {});
}

function shareGame() {
    const text = `🚀 Independence Run: Boss besiegt! 🏆 Spiel mit: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function update() {
    if (gameState === 'PLAYING' || gameState === 'BOSS') {
        backgroundY = (backgroundY + gameSpeed/2) % 1920;
        frameCount++;

        // Hindernis-Spawning
        if (frameCount % 70 === 0 && gameState === 'PLAYING') {
            let type = (Math.random() > 0.35) ? 'gate' : 'agent';
            obstacles.push({type: type, lane: Math.floor(Math.random()*3), y: -300});
        }

        // BOSS-KI: Bewegung & Projektile
        if (gameState === 'BOSS') {
            if (frameCount % 60 === 0) bossLane = Math.floor(Math.random()*3);
            if (frameCount % 50 === 0) obstacles.push({type: 'arrow', lane: bossLane, y: 300});
        }

        obstacles.forEach((o, i) => {
            o.y += gameSpeed;
            if (o.y > 1400 && o.y < 1700 && o.lane === playerLane) {
                if (o.type === 'gate') { score += 20; obstacles.splice(i, 1); }
                else if (o.type === 'agent') { score = Math.max(0, score - 15); obstacles.splice(i, 1); }
                else if (o.type === 'arrow') { 
                    playerHP--; obstacles.splice(i, 1);
                    if(playerHP <= 0) { gameState = 'GAMEOVER'; audio.main.pause(); audio.lose.play(); }
                }
            }
            if (o.y > 2000) obstacles.splice(i, 1);
        });

        projectiles.forEach((p, i) => {
            p.y -= 40;
            if (p.y < 500 && p.lane === bossLane && gameState === 'BOSS') { 
                bossHP--; projectiles.splice(i, 1);
                if (bossHP <= 0) { gameState = 'VICTORY'; audio.main.pause(); audio.win.play(); }
            }
            if (p.y < -100) projectiles.splice(i, 1);
        });

        // Level-Aufstieg (Angepasste Limits)
        if (gameState === 'PLAYING') {
            if (score >= 250 && currentLevel === 1) currentLevel = 2;
            else if (score >= 600 && currentLevel === 2) currentLevel = 3;
            else if (score >= 1000 && currentLevel === 3) { gameState = 'BOSS'; obstacles = []; }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'START') {
        ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        let bg = (gameState === 'BOSS') ? images.bg4 : images['bg' + currentLevel];
        ctx.drawImage(bg, 0, backgroundY, 1080, 1920);
        ctx.drawImage(bg, 0, backgroundY - 1920, 1080, 1920);

        if (gameState === 'BOSS') {
            ctx.drawImage(images.boss, 360 * bossLane + 50, 150, 360, 360);
            ctx.fillStyle = "red"; ctx.fillRect(340, 120, 40 * bossHP, 20);
        }

        ctx.drawImage(images.fx_shadow, 360 * playerLane + 80, 1650, 200, 100);
        ctx.drawImage(images['runner_' + selectedGender], 360 * playerLane + 50, 1400, 260, 320);

        obstacles.forEach(o => {
            let img = (o.type === 'gate') ? images.gate : (o.type === 'agent' ? images.agent : images.proj_syn);
            ctx.drawImage(img, 360 * o.lane + 55, o.y, 250, 250);
        });

        projectiles.forEach(p => ctx.drawImage(images.proj_ty, 360 * p.lane + 130, p.y, 100, 200));

        let ui = (gameState === 'BOSS') ? images.ui_hp : images.ui_score;
        ctx.drawImage(ui, 50, 50, 400, 150);
        ctx.fillStyle = "black"; ctx.font = "bold 65px Arial"; ctx.textAlign = "center";
        ctx.fillText((gameState === 'BOSS' ? playerHP : score), 285, 148);
    } else if (gameState === 'GAMEOVER') ctx.drawImage(images.sc_gameover, 0, 0, 1080, 1920);
    else if (gameState === 'VICTORY') ctx.drawImage(images.sc_victory, 0, 0, 1080, 1920);

    requestAnimationFrame(draw);
}
setInterval(update, 1000/60); draw();
</script>
</body>
</html>
